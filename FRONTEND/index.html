<script>
function empLogin() {
    const username = document.getElementById("empUser").value;
    const password = document.getElementById("empPass").value;

    fetch("https://ecap-de9j.onrender.com/login/employee", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            localStorage.setItem("role", "employee");
            window.location.href = "employee.html";
        } else {
            alert("Invalid Login");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Server error");
    });
}

function stuLogin() {
    const roll_no = document.getElementById("stuUser").value;
    const password = document.getElementById("stuPass").value;

    fetch("https://ecap-de9j.onrender.com/login/student", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ roll_no, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            localStorage.setItem("role", "student");
            localStorage.setItem("roll_no", roll_no);
            window.location.href = "student.html";
        } else {
            alert("Invalid Login");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Server error");
    });
}
</script>
