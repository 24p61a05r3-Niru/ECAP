<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="login.css">
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    color: white;
}

h1 {
    margin-top: 30px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 80px;
}

.card {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 12px;
    width: 280px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.card img {
    width: 80px;
    margin-bottom: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px;
    width: 100%;
    background: #4f46e5;
    color: white;
    border: none;
}
</style>

</head>

<body>

<h1>🎓 ECAP Attendance System</h1>

<div class="container">

<!-- EMPLOYEE -->
<div class="card">
    <img src="FacLogo.jpg">
    <h3>Faculty Login</h3>
    <input id="empUser" placeholder="Username">
    <input id="empPass" type="password" placeholder="Password">
    <button onclick="empLogin()">Login</button>
</div>

<!-- STUDENT -->
<div class="card">
    <img src="Colstulogo.png">
    <h3>Student Login</h3>
    <input id="stuUser" placeholder="Roll No">
    <input id="stuPass" type="password" placeholder="Password">
    <button onclick="stuLogin()">Login</button>
</div>

</div>

<script>
// SAME JS AS BEFORE
function empLogin() {
    const username = empUser.value;
    const password = empPass.value;

    fetch("https://ecap-de9j.onrender.com/login/employee"), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    }
    .then(res => res.json())
    .then(data => {
        if(data.success){
            localStorage.setItem("role", "employee");
            window.location.href = "employee.html";
        } else alert("Invalid Login");
    });
}

function stuLogin() {
    const roll_no = stuUser.value;
    const password = stuPass.value;

    fetch('https://ecap-de9j.onrender.com/login/student'), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ roll_no, password })
    }
    .then(res => res.json())
    .then(data => {
        if(data.success){
            localStorage.setItem("role", "student");
            localStorage.setItem("roll_no", roll_no);
            window.location.href = "student.html";
        } else alert("Invalid Login");
    });
}
</script>

</body>
</html>
